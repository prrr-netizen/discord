<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>rlnl</title>

    <!-- 로컬 CSS -->
    <link rel="stylesheet" href="bulma.min.css" />
    <link rel="stylesheet" href="style.css" />

    <!-- 로컬 JS (jQuery) -->
    <script src="jquery-3.6.0.js"></script>
  </head>
  <body>
    <!-- Back To Top Start -->
    <a id="backtotop" aria-label="맨 위로 이동">
      ▲
    </a>
    <!-- Back To Top End -->

    <!-- Navbar Start -->
    <nav class="navbar is-fixed-top" role="navigation" aria-label="main navigation">
      <div class="navbar-brand mt-2 mb-2">
        <a class="navbar-item" href="#">
          <strong>rlnl</strong>
        </a>

        <a
          role="button"
          class="navbar-burger has-text-white"
          data-target="navbarMenu"
          aria-label="menu"
          aria-expanded="false"
        >
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </a>
      </div>

      <div id="navbarMenu" class="navbar-menu">
        <div class="navbar-start">
          <a href="#" class="navbar-item is-tab">홈</a>
        </div>

        <div class="navbar-end">
          <a href="https://discord.gg/dsZjSb8JS2" class="navbar-item is-tab" target="_blank">
            Discord 서버
          </a>

          <div class="navbar-item">
            <div class="buttons">
              <a href="#" class="button is-blurple" title="나만 쓰는 rlnl 패널 홈">
                <strong>rlnl 패널</strong>
              </a>
            </div>
          </div>
        </div>
      </div>
    </nav>
    <!-- Navbar End -->

    <!-- Single Section Start -->
    <section class="hero bg-base is-fullheight">
      <div class="hero-body">
        <div class="columns is-vcentered">
          <div class="column mr-6 mt-6">
            <p class="title has-text-white has-text-weight-bold">
              rlnl<br />
              <span class="blurple">나만 쓰는</span> 디스코드 툴 허브.
            </p>
            <p class="subtitle has-text-grey-light is-size-6 mt-3">
              이 페이지는 Nana가 사용하는 개인용 rlnl 패널입니다.<br />
              실제 유저용 서비스 페이지가 아니라, 봇·패널·테스트 서버를 관리하기 위한
              내부용 홈 화면으로 사용되고 있습니다.
            </p>

            <div class="buttons mt-4">
              <a href="https://discord.gg/dsZjSb8JS2" class="button is-info">
                <strong>테스트 서버 열기</strong>
              </a>
              <a href="#" class="button is-primary is-outlined">
                <strong>추가 패널 연결 (준비 중)</strong>
              </a>
            </div>
          </div>

          <div class="column mt-6">
            <img
              class="image has-image-centered vert-move mt-4"
              src="relaunch_day.svg"
              alt="rlnl 패널"
              style="width: 20rem;"
            />
          </div>
        </div>
      </div>
    </section>
    <!-- Single Section End -->

    <!-- Footer Start -->
    <footer class="footer bg-base">
      <div class="content has-text-centered has-text-white">
        <p>
          <span class="has-text-weight-bold">rlnl</span>
          <br />
          개인용 디스코드 툴 패널
          <br />
          &copy; <span id="cp-year"></span> Nana. All Rights Reserved.
        </p>
      </div>
    </footer>
    <!-- Footer End -->

    <!-- 로컬 스크립트 -->
    <script>
      // navbar burger 토글
      document.addEventListener("DOMContentLoaded", () => {
        const burger = document.querySelector(".navbar-burger");
        const menu = document.querySelector("#navbarMenu");

        if (burger && menu) {
          burger.addEventListener("click", () => {
            burger.classList.toggle("is-active");
            menu.classList.toggle("is-active");
          });
        }
      });

      // navbar on scroll
      $(function () {
        $(window).on("scroll", function () {
          if ($(window).scrollTop() > 700) {
            $("nav").addClass("nav-w");
            $(".navbar-menu").addClass("nav-w");
            $(".navbar-item").addClass("nav-dark");
            $(".navbar-link").addClass("nav-dark");
            $(".navbar-burger").removeClass("has-text-white");
            $(".navbar-burger").addClass("has-text-dark");
          } else {
            $("nav").removeClass("nav-w");
            $(".navbar-menu").removeClass("nav-w");
            $(".navbar-item").removeClass("nav-dark");
            $(".navbar-link").removeClass("nav-dark");
            $(".navbar-burger").removeClass("has-text-dark");
            $(".navbar-burger").addClass("has-text-white");
          }
        });
      });

      // back to top
      var btn = $("#backtotop");

      $(window).scroll(function () {
        if ($(window).scrollTop() > 100) {
          btn.addClass("show");
        } else {
          btn.removeClass("show");
        }
      });

      btn.on("click", function (e) {
        e.preventDefault();
        $("html, body").animate({ scrollTop: 0 }, 300);
      });

      // copyright year
      document.getElementById("cp-year").innerHTML = new Date().getFullYear();
    </script>
  </body>
</html>
